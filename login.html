<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nestlé SSAMS — Login · PB1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* ── Design Tokens (match index.html) ── */
        :root {
            --nestle-blue: #003087;
            --nestle-light-blue: #0057B8;
            --nestle-accent: #00AEEF;
        }

        * { font-family: 'DM Sans', sans-serif; }
        .mono { font-family: 'DM Mono', monospace; }

        /* ── Login background ── */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #003087 0%, #0057B8 50%, #00AEEF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Animated background mesh ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(0,174,239,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 70%, rgba(0,48,135,0.25) 0%, transparent 55%);
            pointer-events: none;
        }

        /* ── Card ── */
        .login-card {
            position: relative;
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            padding: 48px 44px;
            width: 440px;
            max-width: 95vw;
            box-shadow: 0 32px 80px rgba(0,48,135,0.30), 0 0 0 1px rgba(255,255,255,0.5);
        }

        /* ── Form elements ── */
        .form-input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            color: #1e293b;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
        }
        .form-input:focus {
            border-color: var(--nestle-accent);
            box-shadow: 0 0 0 3px rgba(0,174,239,0.12);
        }
        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
        }

        /* ── Spinner ── */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Role toggle tabs ── */
        .role-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: #64748b;
        }
        .role-tab.active {
            background: var(--nestle-blue);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,48,135,0.25);
        }

        /* ── Divider line ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 500;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        /* ── Credential pill ── */
        .cred-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .cred-pill:hover { background: #e2e8f0; }

        /* ── Card fade-in ── */
        .login-card {
            animation: cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>

<body>
    <div class="login-card">

        <!-- ── Logo ── -->
        <div class="flex items-center gap-3 mb-8">
            <div class="w-11 h-11 rounded-xl flex items-center justify-center shadow-md"
                 style="background: linear-gradient(135deg, var(--nestle-blue), var(--nestle-light-blue));">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
            </div>
            <div>
                <div class="text-[10px] text-slate-400 font-semibold tracking-[0.15em] uppercase">Nestlé · Sprint 1</div>
                <div class="text-sm font-bold text-slate-800 leading-tight">Smart Stock Aging System</div>
            </div>
            <!-- PB tag -->
            <span class="ml-auto text-[10px] font-bold px-2.5 py-1 rounded-full bg-blue-50 text-blue-600 border border-blue-100 mono">PB1</span>
        </div>

        <!-- ── Heading ── -->
        <h1 class="text-2xl font-bold text-slate-900 mb-1">Welcome back</h1>
        <p class="text-sm text-slate-500 mb-6">Sign in to access the warehouse management platform.</p>

        <!-- ── Role selector ── -->
        <div class="flex gap-1.5 p-1 bg-slate-100 rounded-xl mb-6" id="role-tabs">
            <div class="role-tab active" onclick="selectRole('supervisor')" id="tab-supervisor">
                🏢 Warehouse Supervisor
            </div>
            <div class="role-tab" onclick="selectRole('staff')" id="tab-staff">
                📦 Warehouse Staff
            </div>
        </div>

        <!-- ── Form ── -->
        <div class="space-y-4">
            <div>
                <label class="form-label">Email Address</label>
                <input id="login-email" type="email" class="form-input"
                       placeholder="you@nestle.com" autocomplete="email" />
            </div>
            <div>
                <label class="form-label">Password</label>
                <div class="relative">
                    <input id="login-password" type="password" class="form-input pr-10"
                           placeholder="••••••••" autocomplete="current-password"
                           onkeydown="if(event.key==='Enter') doLogin()" />
                    <button onclick="togglePwd()" tabindex="-1"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                        <svg id="pwd-eye" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Error panel -->
            <div id="login-error"
                 class="hidden text-xs text-red-700 bg-red-50 border border-red-200 rounded-xl px-4 py-3 flex items-center gap-2">
                <svg class="w-4 h-4 flex-shrink-0 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span id="login-error-msg"></span>
            </div>

            <!-- Sign In button -->
            <button id="login-btn" onclick="doLogin()"
                    class="w-full py-3 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2 transition-all hover:opacity-90 active:scale-95"
                    style="background: linear-gradient(135deg, var(--nestle-blue), var(--nestle-light-blue));">
                <span id="login-btn-text">Sign In</span>
                <div id="login-spinner" class="spinner hidden"></div>
            </button>
        </div>

        <!-- ── Demo credentials ── -->
        <div class="divider">Demo credentials — click to fill</div>
        <div class="flex flex-wrap gap-2">
            <button class="cred-pill" onclick="fillCreds('supervisor@nestle.com','nestle123')">
                <span class="w-1.5 h-1.5 rounded-full bg-purple-400"></span>
                <span class="text-slate-600 font-medium">Supervisor</span>
                <span class="mono text-slate-400">supervisor@nestle.com</span>
            </button>
            <button class="cred-pill" onclick="fillCreds('staff@nestle.com','nestle123')">
                <span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span>
                <span class="text-slate-600 font-medium">Staff</span>
                <span class="mono text-slate-400">staff@nestle.com</span>
            </button>
        </div>

        <!-- ── Footer note ── -->
        <p class="text-[11px] text-slate-400 text-center mt-6">
            PB1 · User Authentication · Firebase Auth + Firestore roles
        </p>
    </div>

    <!-- ══════════════════════════════════════════════════
         FIREBASE — PB1: User Authentication
         Acceptance criteria:
           ✅ Valid credentials → user logged in
           ✅ Invalid credentials → login rejected with message
           ✅ System assigns access based on user role
    ══════════════════════════════════════════════════ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ── Firebase init ──
        const firebaseConfig = {
            apiKey: "AIzaSyCvhJluiWt-10DLKMHgIHdI04f_xRRUWhU",
            authDomain: "auth-2fda3.firebaseapp.com",
            projectId: "auth-2fda3",
            storageBucket: "auth-2fda3.firebasestorage.app",
            messagingSenderId: "593009113366",
            appId: "1:593009113366:web:b63dd7eb8d0ebeb3aaf837"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ── Check if already logged in → redirect to dashboard ──
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        // ── Role tab selection ──
        window.selectRole = function(role) {
            document.getElementById('tab-supervisor').classList.toggle('active', role === 'supervisor');
            document.getElementById('tab-staff').classList.toggle('active', role === 'staff');
        };

        // ── Fill demo credentials ──
        window.fillCreds = function(email, pwd) {
            document.getElementById('login-email').value = email;
            document.getElementById('login-password').value = pwd;
            document.getElementById('login-email').focus();
        };

        // ── Toggle password visibility ──
        window.togglePwd = function() {
            const inp = document.getElementById('login-password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        };

        // ── Login handler ──
        window.doLogin = async function() {
            const email  = document.getElementById('login-email').value.trim();
            const pwd    = document.getElementById('login-password').value;
            const errEl  = document.getElementById('login-error');
            const errMsg = document.getElementById('login-error-msg');

            // Clear error
            errEl.classList.add('hidden');

            // Validate fields
            if (!email || !pwd) {
                errMsg.textContent = 'Please enter your email and password.';
                errEl.classList.remove('hidden');
                return;
            }

            // Loading state
            document.getElementById('login-btn').disabled = true;
            document.getElementById('login-btn-text').textContent = 'Signing in…';
            document.getElementById('login-spinner').classList.remove('hidden');

            try {
                // PB1: Authenticate via Firebase Auth
                const cred = await signInWithEmailAndPassword(auth, email, pwd);

                // PB1: Fetch role from Firestore users/{uid}
                const snap = await getDoc(doc(db, 'users', cred.user.uid));
                const userData = snap.exists()
                    ? snap.data()
                    : { displayName: email.split('@')[0], role: 'Warehouse Staff' };

                // Store session data for other pages
                sessionStorage.setItem('user_uid', cred.user.uid);
                sessionStorage.setItem('user_name', userData.displayName || email.split('@')[0]);
                sessionStorage.setItem('user_role', userData.role || 'Warehouse Staff');
                sessionStorage.setItem('user_email', email);

                // PB1: Redirect based on role
                // Supervisor → dashboard.html | Staff → dashboard.html (same, different sidebar items shown)
                window.location.href = 'dashboard.html';

            } catch (e) {
                // PB1: Invalid credentials → login rejected with error message
                const msgs = {
                    'auth/user-not-found':    'No account found with this email.',
                    'auth/wrong-password':    'Incorrect password. Please try again.',
                    'auth/invalid-email':     'Please enter a valid email address.',
                    'auth/too-many-requests': 'Too many failed attempts. Please wait a moment.',
                    'auth/invalid-credential':'Invalid email or password. Please try again.',
                };
                errMsg.textContent = msgs[e.code] || 'Authentication failed: ' + e.message;
                errEl.classList.remove('hidden');

                document.getElementById('login-btn').disabled = false;
                document.getElementById('login-btn-text').textContent = 'Sign In';
                document.getElementById('login-spinner').classList.add('hidden');
            }
        };
    </script>
</body>
</html>
