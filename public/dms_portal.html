<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nestlé SSAMS — DMS Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>

<body class="bg-slate-50 text-slate-800">

    <div id="app-shell" class="flex h-screen overflow-hidden">
        <div id="sidebar-slot"></div>

        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            <div id="header-slot"></div>

            <main class="flex-1 overflow-y-auto p-6 space-y-6">

                <!-- Stats Row -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="stat-card">
                        <div class="text-xs text-slate-400 font-semibold uppercase tracking-wide mb-1">Total Orders</div>
                        <div class="text-2xl font-bold text-slate-800" id="stat-total">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="text-xs text-slate-400 font-semibold uppercase tracking-wide mb-1">Processing</div>
                        <div class="text-2xl font-bold text-amber-500" id="stat-processing">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="text-xs text-slate-400 font-semibold uppercase tracking-wide mb-1">Shipped</div>
                        <div class="text-2xl font-bold text-blue-500" id="stat-shipped">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="text-xs text-slate-400 font-semibold uppercase tracking-wide mb-1">Delivered</div>
                        <div class="text-2xl font-bold text-green-500" id="stat-delivered">—</div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden">
                    <div class="px-6 py-4 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h3 class="font-semibold text-slate-900 text-sm">DMS Integration Console</h3>
                            <p class="text-xs text-slate-400 mt-0.5">Mocked ERP / DMS environment managing sales orders from the SSAMS Platform.</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <input id="order-search" type="text" placeholder="Search orders..."
                                   class="text-xs border border-slate-200 rounded-lg px-3 py-2 outline-none focus:border-blue-300 w-full md:w-64"
                                   oninput="filterOrders()" />
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Retailer</th>
                                    <th>Product</th>
                                    <th>Batch #</th>
                                    <th>Quantity</th>
                                    <th>Date Received</th>
                                    <th>Fulfillment Status</th>
                                    <th class="text-right">DMS Actions</th>
                                </tr>
                            </thead>
                            <tbody id="orders-tbody">
                                <tr>
                                    <td colspan="8" class="text-center text-slate-400 py-8 text-sm">Loading DMS data…</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, updateDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { buildSidebar, buildHeader, toast, fmtDate, badgeHtml, startClock } from './sidebar.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCvhJluiWt-10DLKMHgIHdI04f_xRRUWhU",
            authDomain: "auth-2fda3.firebaseapp.com",
            projectId: "auth-2fda3",
            storageBucket: "auth-2fda3.firebasestorage.app",
            messagingSenderId: "593009113366",
            appId: "1:593009113366:web:b63dd7eb8d0ebeb3aaf837"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allOrders = [];

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }

            if (!sessionStorage.getItem('user_uid')) {
                const snap = await getDoc(doc(db, 'users', user.uid));
                const data = snap.exists() ? snap.data() : {};
                sessionStorage.setItem('user_uid', user.uid);
                sessionStorage.setItem('user_name', data.displayName || user.email.split('@')[0]);
                sessionStorage.setItem('user_role', data.role || 'Logistics');
            }

            // Role Check: We allow Supervisors, Planners, Logistics, or any staff. Retailers are blocked.
            const role = sessionStorage.getItem('user_role') || '';
            if (role.toLowerCase() === 'retailer') {
                sessionStorage.setItem('access_denied_msg', 'Access Denied: Internal DMS Only');
                window.location.href = 'retailer.html';
                return;
            }

            document.getElementById('sidebar-slot').innerHTML = buildSidebar('dms_portal');
            document.getElementById('header-slot').innerHTML = buildHeader('DMS Portal', 'Mock Enterprise Resource Planning integration');
            startClock();
            loadSalesOrders();
        });

        window.doLogout = async () => {
            await signOut(auth);
            sessionStorage.clear();
            window.location.href = 'index.html';
        };

        function loadSalesOrders() {
            const q = query(collection(db, 'sales_orders'), orderBy('createdAt', 'desc'));
            onSnapshot(q, (snap) => {
                allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderOrders(allOrders);
                updateStats(allOrders);
            }, err => {
                console.error("DMS Error:", err);
                toast('Error loading DMS records: ' + err.message, 'error');
            });
        }

        window.filterOrders = function() {
            const q = document.getElementById('order-search').value.toLowerCase();
            const filtered = q ? allOrders.filter(o =>
                (o.retailerName || '').toLowerCase().includes(q) ||
                (o.productName || '').toLowerCase().includes(q) ||
                (o.orderId || '').toLowerCase().includes(q)
            ) : allOrders;
            renderOrders(filtered);
        };

        function updateStats(orders) {
            let processing = 0, shipped = 0, delivered = 0;
            orders.forEach(o => {
                if (o.fulfillmentStatus === 'Processing') processing++;
                if (o.fulfillmentStatus === 'Shipped') shipped++;
                if (o.fulfillmentStatus === 'Delivered') delivered++;
            });
            document.getElementById('stat-total').textContent = orders.length;
            document.getElementById('stat-processing').textContent = processing;
            document.getElementById('stat-shipped').textContent = shipped;
            document.getElementById('stat-delivered').textContent = delivered;
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('orders-tbody');
            if (!orders.length) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center text-slate-400 py-8 text-sm">No sales orders found in DMS.</td></tr>`;
                return;
            }

            const statusColors = { 
                'Processing': 'yellow', 
                'Shipped': 'blue', 
                'Delivered': 'green' 
            };

            tbody.innerHTML = orders.map(o => {
                const ts = o.createdAt ? fmtDate(o.createdAt) : '—';
                const statusColor = statusColors[o.fulfillmentStatus] || 'gray';
                
                let actionsHtml = '';
                if (o.fulfillmentStatus === 'Processing') {
                    actionsHtml = `<button onclick="updateOrderStatus('${o.id}', 'Shipped')" class="text-xs bg-blue-50 text-blue-600 border border-blue-200 px-3 py-1.5 rounded hover:bg-blue-100 transition-colors">Mark Shipped</button>`;
                } else if (o.fulfillmentStatus === 'Shipped') {
                    actionsHtml = `<button onclick="updateOrderStatus('${o.id}', 'Delivered')" class="text-xs bg-green-50 text-green-600 border border-green-200 px-3 py-1.5 rounded hover:bg-green-100 transition-colors">Mark Delivered</button>`;
                } else {
                    actionsHtml = `<span class="text-xs text-slate-400 italic">Completed</span>`;
                }

                return `<tr>
                    <td class="mono text-xs font-medium text-slate-700">${o.orderId || o.id.slice(0,8)}</td>
                    <td class="text-sm font-medium text-slate-800">${o.retailerName || 'Unknown Retailer'}</td>
                    <td class="text-sm">${o.productName || '—'}</td>
                    <td class="mono text-xs text-slate-500">${o.batchNumber || '—'}</td>
                    <td class="mono text-sm">${(o.claimedQuantity || 0).toLocaleString()}</td>
                    <td class="text-xs text-slate-500">${ts}</td>
                    <td>${badgeHtml(o.fulfillmentStatus || 'Pending', statusColor)}</td>
                    <td class="text-right">${actionsHtml}</td>
                </tr>`;
            }).join('');
        }

        window.updateOrderStatus = async function(orderId, newStatus) {
            if (!confirm(`Are you sure you want to update this order to ${newStatus}?`)) return;
            try {
                await updateDoc(doc(db, 'sales_orders', orderId), {
                    fulfillmentStatus: newStatus
                });
                toast(`Order marked as ${newStatus} successfully.`, 'success');
            } catch (err) {
                toast(`Failed to update status: ${err.message}`, 'error');
            }
        };
    </script>
</body>
</html>
